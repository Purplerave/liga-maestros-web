name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest ruff pip-audit

      - name: Lint with ruff
        run: ruff check app.py scoring.py tests --select E,F,W --ignore E501,E741,F841

      - name: Dependency security audit
        run: pip-audit -r requirements.txt --progress-spinner off || true

      - name: Python syntax check
        run: python -m py_compile app.py utils.py scoring.py config.py LIVE_COLLECTOR.py AUDITAR_JORNADA_LIGA_MAESTROS.py SCRAPE_QUINIELA15_DIRECTO.py IMPORTAR_PROGRAMA_JORNADA.py liga_maestros/__init__.py liga_maestros/workers/web_collector.py liga_maestros/routes/snake.py liga_maestros/routes/quiz.py liga_maestros/services/quiz.py

      - name: JavaScript syntax check
        run: |
          node --check static/js/quantum_final.js
          node --check static/js/snake_gol_arcade.js

      - name: Tests
        run: pytest -q
