name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest ruff pip-audit

      - name: Lint with ruff
        run: ruff check app.py scoring.py tests --select E,F,W --ignore E501,E741,F841

      - name: Dependency security audit
        run: pip-audit -r requirements.txt --progress-spinner off

      - name: Reject databases and private key material
        run: |
          if git ls-files | grep -Ei '(^|/)(\.env|.*\.(db|sqlite|sqlite3|pem|key)|id_rsa|id_ed25519)$'; then
            echo "Sensitive runtime material is tracked by Git."
            exit 1
          fi

      - name: Python syntax check
        run: python -m py_compile app.py utils.py scoring.py config.py LIVE_COLLECTOR.py AUDITAR_JORNADA_LIGA_MAESTROS.py SCRAPE_QUINIELA15_DIRECTO.py IMPORTAR_PROGRAMA_JORNADA.py liga_maestros/__init__.py liga_maestros/workers/web_collector.py liga_maestros/routes/snake.py liga_maestros/routes/quiz.py liga_maestros/services/quiz.py

      - name: JavaScript syntax check
        run: |
          node --check static/js/quantum_final.js
          node --check static/js/snake_gol_arcade.js

      - name: Tests
        run: pytest -q
