<!DOCTYPE html>

<head>

    <meta name="theme-color" content="#06090f" />
    <title>Liga de Maestros - Humanos vs IAs</title>
    <link rel="icon" type="image/png" href="{{ url_for('main.static_files', filename='img/ligademaestroslogo_trans.png', v=assets_v) }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="{{ url_for('main.static_files', filename='css/components/team_badges.css', v=assets_v ~ '-badges-1') }}">
    <link rel="stylesheet" href="{{ url_for('main.static_files', filename='css/themes/newspaper/shell.css', v=assets_v ~ '-newspaper-split-1') }}">
    <link rel="stylesheet" href="{{ url_for('main.static_files', filename='css/themes/newspaper/page_foundations.css', v=assets_v ~ '-newspaper-split-1') }}">
    <link rel="stylesheet" href="{{ url_for('main.static_files', filename='css/themes/newspaper/components.css', v=assets_v ~ '-newspaper-split-1') }}">
    <link rel="stylesheet" href="{{ url_for('main.static_files', filename='css/themes/newspaper/ticket_readability.css', v=assets_v ~ '-newspaper-split-1') }}">
    <link rel="stylesheet" href="{{ url_for('main.static_files', filename='css/themes/newspaper/masthead.css', v=assets_v ~ '-newspaper-split-1') }}">
    <link rel="stylesheet" href="{{ url_for('main.static_files', filename='css/themes/newspaper/ticket_compact.css', v=assets_v ~ '-newspaper-split-1') }}">
    <link rel="stylesheet" href="{{ url_for('main.static_files', filename='css/typewriter_system.css', v=assets_v ~ '-typewriter-7') }}">
    <link rel="stylesheet" href="{{ url_for('main.static_files', filename='css/components/surface_shape.css', v=assets_v ~ '-surface-shape-1') }}">

    <link rel="stylesheet" href="{{ url_for('main.static_files', filename='css/base/typography.css', v=assets_v ~ '-typography-1') }}">

<body class="newspaper-ui quiniela-focus newspaper-cover-active" data-jornada="{{ jornada }}" data-assets-v="{{ assets_v }}">
    <div class="app-shell">
        <section class="panel header-brand-panel">
            <img class="sidebar-brand-image" src="{{ url_for('main.static_files', filename='img/ligademaestroslogo_trans.png', v=assets_v) }}" alt="Liga de Maestros - 1X2 - La Pe&ntilde;a vs IA">
        </section>

        <header class="topbar-shell">
            <div class="topbar-context">
                <div id="topbar-kicker" class="topbar-kicker">Jornada &middot; La Pe&ntilde;a vs Maestros IA</div>
                <div id="topbar-title" class="topbar-title">La Pe&ntilde;a contra los Maestros IA</div>
            </div>

            <div class="topbar-filters">
                <div class="field-group ticket-jornada-filter">
                    <label for="jornada-nav">Ver jornada</label>
                    <select id="jornada-nav"></select>
                </div>
            </div>

            <div class="topbar-actions">
                <div id="user-profile-nav" class="user-panel"></div>
                <button id="refresh-btn" class="icon-btn" type="button" title="Actualizar">Actualizar</button>
                <button id="save-quiniela-btn" class="primary-btn" type="button">Guardar quiniela</button>
                <button id="share-ticket-btn" class="primary-btn" type="button">Compartir</button>
            </div>

        </header>

        <nav class="newspaper-page-nav" aria-label="Navegaci&oacute;n principal">
            <button class="active" type="button" data-page-action="ALL"><span>Portada</span></button>
            <button type="button" data-page-action="TICKET"><span>Quiniela</span></button>
            <button type="button" data-page-action="LIVE"><span>Directo</span></button>
            <button type="button" data-page-action="STANDINGS"><span>Ligas</span></button>
            <button type="button" data-page-action="SNAKE"><span>Juegos</span></button>
            <button type="button" data-page-action="CONTEST"><span>La Pe&ntilde;a</span></button>
        </nav>

        <main class="main-arena">
            <section id="matches-body" class="arena-content" aria-live="polite"></section>
        </main>
    </div>
    <nav class="site-legal-links" aria-label="Informaci&oacute;n legal">
        <a href="/privacidad">Privacidad</a>
        <a href="/cookies">Cookies</a>
        <a href="/aviso-legal">Aviso legal</a>
    </nav>
    <div id="toast-container"></div>
    <script defer src="{{ url_for('main.static_files', filename='js/utils.js', v=assets_v ~ '-utils-5') }}"></script>
    <script defer src="{{ url_for('main.static_files', filename='js/state.js', v=assets_v ~ '-state-5') }}"></script>
    <script defer src="{{ url_for('main.static_files', filename='js/logos.js', v=assets_v ~ '-logos-1') }}"></script>
    <script defer src="{{ url_for('main.static_files', filename='js/navigation.js', v=assets_v ~ '-navigation-4') }}"></script>
    <script defer src="{{ url_for('main.static_files', filename='js/live.js', v=assets_v ~ '-live-2') }}"></script>
    <script defer src="{{ url_for('main.static_files', filename='js/arena.js', v=assets_v ~ '-arena-8') }}"></script>
    <script defer src="{{ url_for('main.static_files', filename='js/events.js', v=assets_v ~ '-events-9') }}"></script>
    <script defer src="{{ url_for('main.static_files', filename='js/quantum_final.js', v=assets_v ~ '-ui-quiniela-36') }}"></script>
</body>
