services:
  - type: web
    name: liga-maestros
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: HIGHLIGHTLY_API_KEY
        sync: false
      - key: HIGHLIGHTLY_REFRESH_ENABLED
        value: "1"
      - key: ALLOW_LOCAL_ADMIN
        value: "0"
      - key: ADMIN_EMAILS
        sync: false
